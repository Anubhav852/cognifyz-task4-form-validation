<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cognifyz Task 4 - Form Validation</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav>
    <span class="logo">Cognifyz Task 4</span>
    <div class="nav-links">
      <a href="#register">Register</a>
      <a href="#login">Login</a>
      <a href="#dashboard">Dashboard</a>
    </div>
  </nav>

  <!-- REGISTER PAGE -->
  <div id="register" class="page">
    <h2>Create Account</h2>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="reg-username" placeholder="Enter username" />
      <span class="error" id="err-username"></span>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="Enter email" />
      <span class="error" id="err-email"></span>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="Enter password" />
      <div class="strength-bar"><div id="strength-fill"></div></div>
      <span id="strength-text"></span>
      <span class="error" id="err-password"></span>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="reg-confirm" placeholder="Confirm password" />
      <span class="error" id="err-confirm"></span>
    </div>
    <button id="reg-btn">Register</button>
    <div id="register-success" class="success hidden"></div>
  </div>

  <!-- LOGIN PAGE -->
  <div id="login" class="page hidden">
    <h2>Welcome Back</h2>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="Enter email" />
      <span class="error" id="err-login-email"></span>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Enter password" />
      <span class="error" id="err-login-password"></span>
    </div>
    <button id="login-btn">Login</button>
    <div id="login-success" class="success hidden"></div>
  </div>

  <!-- DASHBOARD PAGE -->
  <div id="dashboard" class="page hidden">
    <h2>Dashboard</h2>
    <p id="dash-welcome" class="dash-msg">Please log in first.</p>
    <div id="user-list"></div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
